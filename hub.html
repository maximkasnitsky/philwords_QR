<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Интерактивные задания</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #f8fafc;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
        }

        .container {
            max-width: 420px;
            width: 100%;
            text-align: center;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 700;
            color: #1e293b;
            margin-bottom: 2rem;
        }

        .buttons {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .task-btn {
            display: block;
            width: 100%;
            padding: 1.25rem 1.5rem;
            font-size: 1.1rem;
            font-weight: 600;
            font-family: inherit;
            color: #fff;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            text-decoration: none;
            transition: transform 0.15s ease, box-shadow 0.15s ease;
        }

        .task-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
        }

        .task-btn:active {
            transform: translateY(0);
        }

        .btn-philword  { background: #6366f1; }
        .btn-quest     { background: #f59e0b; }
        .btn-anagram   { background: #10b981; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Выберите задание</h1>
        <div class="buttons">
            <a class="task-btn btn-philword" href="play.html?task=tasks/philword.json">
                Филворд
            </a>
            <a class="task-btn btn-quest" href="https://maximkasnitsky.github.io/quest_QR/play.html?task=tasks/quest.json">
                Квест-комната
            </a>
            <a class="task-btn btn-anagram" href="https://maximkasnitsky.github.io/anagrams_QR/play.html?task=tasks/anagram.json">
                Анаграммы
            </a>
        </div>
    </div>
</body>
</html>
